<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3f5fff"/>
      <stop offset="100%" stop-color="#0722fa"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.15"/>
    </filter>
  </defs>
  <!-- Rounded square background -->
  <rect x="0" y="0" width="512" height="512" rx="108" ry="108" fill="url(#bg)"/>
  <!-- Subtle inner highlight -->
  <rect x="8" y="8" width="496" height="496" rx="100" ry="100" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="4"/>
  <!-- Division symbol with glow -->
  <g filter="url(#glow)">
    <!-- Top dot -->
    <circle cx="256" cy="148" r="36" fill="#ffffff" filter="url(#shadow)"/>
    <!-- Middle bar -->
    <rect x="112" y="228" width="288" height="56" rx="28" ry="28" fill="#ffffff" filter="url(#shadow)"/>
    <!-- Bottom dot -->
    <circle cx="256" cy="364" r="36" fill="#ffffff" filter="url(#shadow)"/>
  </g>
</svg>
